{% extends "base.html" %}

{% block title %}EnvInspect - Field Logger{% endblock %}

{% block content %}
<div class="card" style="text-align: center; padding: 40px 24px; margin-top: 20px;">
    <div
        style="display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; border: 1px solid rgba(16, 185, 129, 0.2); margin-bottom: 24px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
    </div>

    <h1>Environmental Inspector</h1>
    <p class="subtitle">Logging app for Environmental Site Inspections</p>

    <div class="btn-group-stacked">
        <a href="{{ url_for('init_inspection') }}" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="margin-right: 8px;">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Start New Inspection
        </a>
        <a href="{{ url_for('summaries') }}" class="btn btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                style="margin-right: 8px;">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            View Summaries
        </a>
    </div>
</div>
{% endblock %}
