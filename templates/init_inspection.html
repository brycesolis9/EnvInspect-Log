{% extends "base.html" %}

{% block title %}EnvInspect - Start Inspection{% endblock %}

{% block content %}
<div class="card">
    <h2>Initialize Inspection</h2>
    <p class="subtitle">Enter the location and date to begin logging inspection items.</p>
    
    <form action="{{ url_for('init_inspection') }}" method="POST" id="init-form">
        <div class="form-group">
            <label for="site_name">Site Name / Location</label>
            <input type="text" id="site_name" name="site_name" class="form-control" placeholder="e.g., North Reservoir, Sector 4" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="inspection_date">Inspection Date</label>
            <input type="date" id="inspection_date" name="inspection_date" class="form-control" required>
        </div>
        
        <div class="btn-group-stacked">
            <button type="submit" class="btn btn-primary">
                Begin Log Session
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
    // Automatically set default date to today in local time zone
    document.addEventListener("DOMContentLoaded", () => {
        const dateInput = document.getElementById("inspection_date");
        const today = new Date();
        const yyyy = today.getFullYear();
        let mm = today.getMonth() + 1; // Months start at 0
        let dd = today.getDate();
        
        if (mm < 10) mm = '0' + mm;
        if (dd < 10) dd = '0' + dd;
        
        dateInput.value = `${yyyy}-${mm}-${dd}`;
    });
</script>
{% endblock %}
